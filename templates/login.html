<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='icon.png') }}">
    <meta charset="UTF-8">
    <title>Admin Login – Propali Kladionicari</title>

    <link rel="stylesheet" href="https://unpkg.com/@sakun/system.css" />
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="window" style="max-width: 340px; margin: 60px auto;">
    <div class="title-bar">
        <div class="title-bar-text">🔑 Admin Login</div>
    </div>

    <!-- Win98 Menu Bar -->
    <div class="menu-bar">
        <div class="menu-item" style="position:relative;" onclick="this.querySelector('.dropdown').style.display = this.querySelector('.dropdown').style.display === 'flex' ? 'none' : 'flex'">
            Navigacija
            <div class="dropdown" style="display:none;">
                <a href="/">⬅ Natrag na početnu</a>
                <a href="/leaderboard">🏆 Poredak</a>
            </div>
        </div>
    </div>

    <div class="window-body">
        <p style="margin-top:0;"><strong>Unesite administratorske podatke.</strong></p>

        {% if error %}
        <p style="color:red; margin:0 0 8px 0;">⚠ {{ error }}</p>
        {% endif %}

        <form method="POST">
            <div class="field-row-stacked" style="margin-bottom:8px;">
                <label for="username">Korisničko ime</label>
                <input type="text" id="username" name="username" placeholder="admin" required>
            </div>

            <div class="field-row-stacked" style="margin-bottom:12px;">
                <label for="password">Lozinka</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="field-row" style="justify-content:flex-end; gap:6px;">
                <a href="/"><button type="button">Odustani</button></a>
                <button type="submit">Prijava</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Close dropdowns when clicking outside
    document.addEventListener('click', function(e) {
        document.querySelectorAll('.dropdown').forEach(d => {
            if (!d.parentElement.contains(e.target)) d.style.display = 'none';
        });
    });
</script>

</body>
</html>
