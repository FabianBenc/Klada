<!DOCTYPE html>
<html lang="hr">
<head>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='icon.png') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prijava igrača – Propali Kladioničari</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

<div class="window" style="max-width: 360px; margin: 80px auto;">
    <div class="title-bar" style="padding:12px 18px;">
        <div class="title-bar-text"><span style="font-family:'Bebas Neue'; letter-spacing:2px; font-size:16px;"><i data-lucide="user-round" style="width:14px;height:14px;margin-right:5px;vertical-align:middle;"></i>Prijava igrača</span></div>
    </div>

    <div class="window-body" style="padding:24px;">
        <p style="margin-bottom:20px; color:var(--text-muted);">Prijavite se da biste predali ili uredili svoje parove.</p>

        {% if error %}
        <div style="background:rgba(255,68,68,0.12); border:1px solid rgba(255,68,68,0.3); border-radius:6px; padding:10px 14px; margin-bottom:16px; color:var(--red); font-size:13px;">
            ⚠ {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="field-row-stacked">
                <label for="username">Korisničko ime</label>
                <input type="text" id="username" name="username" placeholder="npr. ana" required autocomplete="username">
            </div>

            <div class="field-row-stacked" style="margin-bottom:16px;">
                <label for="password">Lozinka</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <label style="display:flex; align-items:center; gap:7px; margin-bottom:20px; font-size:13px; color:var(--text-muted); cursor:pointer;">
                <input type="checkbox" name="remember_me" style="width:15px; height:15px; margin:0; cursor:pointer;">
                Zapamti me na ovom uređaju
            </label>

            <div style="display:flex; justify-content:flex-end; gap:8px;">
                <button type="submit">Prijava →</button>
            </div>
        </form>

        <div style="display:flex; align-items:center; gap:10px; margin-top:20px;">
            <hr style="flex:1; border:none; border-top:1px solid var(--border); margin:0;">
            <span style="font-size:11px; color:var(--text-muted);">ili</span>
            <hr style="flex:1; border:none; border-top:1px solid var(--border); margin:0;">
        </div>

        <a href="/login" style="display:block; margin-top:14px;">
            <button type="button" style="width:100%; background:var(--surface3); color:var(--text); border:1px solid var(--border) !important;">
                <i data-lucide="shield" style="width:13px;height:13px;vertical-align:middle;margin-right:6px;"></i>
                Admin prijava
            </button>
        </a>

        <p style="margin-top:18px; font-size:12px; color:var(--text-muted);">
            Nemate pristupne podatke? Tražite ih od administratora.
        </p>
    </div>
</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
